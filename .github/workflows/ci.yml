name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint + typecheck + test + build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Third-party actions pinned to full commit SHAs (a tag is mutable) — Dependabot bumps them.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      # The Action runs from its committed bundle, so source can silently drift from what ships.
      # Rebuild happened above; fail if the tracked dist no longer matches (audit #3).
      - name: Verify committed action bundle matches source
        run: git diff --exit-code -- packages/action/dist || { echo "::error::packages/action/dist is stale — run 'npm run build -w @preflight/action' and commit it."; exit 1; }
