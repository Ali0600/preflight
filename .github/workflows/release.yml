name: Release

# Publish the standalone CLI to npm on a version tag. Requires an NPM_TOKEN secret, and the
# npm account must own the @preflight scope (or rename the package before tagging).
on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write # npm provenance

jobs:
  publish:
    name: Publish @preflight/cli
    runs-on: ubuntu-latest
    steps:
      # Third-party actions pinned to full commit SHAs (a tag is mutable) — Dependabot bumps them.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
      - run: npm ci
      - run: npm run lint && npm run typecheck && npm test
      - run: npm run build
      - run: npm publish -w @preflight/cli --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
