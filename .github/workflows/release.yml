name: Release

# Publish the standalone CLI to npm on a version tag. Requires an NPM_TOKEN secret, and the
# npm account must own the @preflight scope (or rename the package before tagging).
on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write # npm provenance

jobs:
  publish:
    name: Publish @preflight/cli
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
      - run: npm ci
      - run: npm run lint && npm run typecheck && npm test
      - run: npm run build
      - run: npm publish -w @preflight/cli --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
