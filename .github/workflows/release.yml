name: Release

# Publish the standalone CLI to npm on a cli-v* tag (e.g. cli-v0.1.0). Requires an NPM_TOKEN
# secret, and the npm account must own the @preflight scope (or rename the package first).
# Plain v* tags (v1, v1.0.0) are reserved for the GitHub ACTION's release pointer — they must
# NOT trigger an npm publish, hence the distinct prefix.
on:
  push:
    tags: ['cli-v*']

permissions:
  contents: read
  id-token: write # npm provenance

jobs:
  publish:
    name: Publish @preflight/cli
    runs-on: ubuntu-latest
    steps:
      # Third-party actions pinned to full commit SHAs (a tag is mutable) — Dependabot bumps them.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
      - run: npm ci
      - run: npm run lint && npm run typecheck && npm test
      - run: npm run build
      - run: npm publish -w @preflight/cli --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
