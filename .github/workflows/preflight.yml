name: Preflight

# Pre-flight dependency changes on every PR. Uses the local action so the workflow
# also exercises Preflight against its own PRs (it comments on this one).
on:
  pull_request:

permissions:
  contents: read
  pull-requests: write
  security-events: write # upload the SARIF to the Security tab

concurrency:
  group: preflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    name: Pre-flight dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Third-party actions pinned to full commit SHAs (a tag is mutable) — Dependabot bumps them.
      # The local `./packages/action` is first-party (runs from this repo's committed bundle).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: preflight
        uses: ./packages/action
        with:
          # Dogfood our own policy: any-CVE vuln gate + install-script/typosquat rules, with the
          # allow-list announced in the comment. Without this the config file was dead weight.
          policy-file: preflight.config.json
      - name: Upload findings to the Security tab
        if: always() && hashFiles('preflight.sarif') != ''
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: preflight.sarif
