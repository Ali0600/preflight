name: Preflight (scheduled)

# Catch CVEs disclosed *after* a dependency was merged: re-scan every committed manifest
# weekly and open/update a tracking issue with anything newly vulnerable.
on:
  schedule:
    - cron: '0 7 * * 1' # Mondays 07:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write
  security-events: write

jobs:
  scan:
    name: Scan committed manifests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Third-party actions pinned to full commit SHAs (a tag is mutable) — Dependabot bumps them.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./packages/action
        with:
          mode: repo
      - name: Upload findings to the Security tab
        if: always() && hashFiles('preflight.sarif') != ''
        uses: github/codeql-action/upload-sarif@411c4c9a36b3fca4d674f06b6396b2c6d23522c6 # v3
        with:
          sarif_file: preflight.sarif
