name: Preflight (scheduled)

# Catch CVEs disclosed *after* a dependency was merged: re-scan every committed manifest
# weekly and open/update a tracking issue with anything newly vulnerable.
on:
  schedule:
    - cron: '0 7 * * 1' # Mondays 07:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write
  security-events: write

jobs:
  scan:
    name: Scan committed manifests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Third-party actions pinned to full commit SHAs (a tag is mutable) — Dependabot bumps them.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./packages/action
        with:
          mode: repo
          # examples/ and test fixtures are INTENTIONALLY vulnerable (demo + regression data) —
          # excluding them keeps the tracking issue signal-only. Exclusions are listed in the issue.
          ignore-paths: 'examples/**,**/tests/fixtures/**'
      - name: Upload findings to the Security tab
        if: always() && hashFiles('preflight.sarif') != ''
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: preflight.sarif
