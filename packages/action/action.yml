name: 'Preflight'
description: "Pre-flight a PR's dependency changes: CVEs (OSV), framework-lockstep status, and auto-update safety."
author: 'Ali Hassan'
branding:
  icon: 'shield'
  color: 'purple'
inputs:
  github-token:
    description: 'Token used to read the PR diff and post the comment.'
    required: false
    default: ${{ github.token }}
  fail-on-cve:
    description: 'Master switch — set to "false" to never fail the check (comment only).'
    required: false
    default: 'true'
  fail-level:
    description: 'When to fail: "cve" (any new CVE), "kev" (confirmed-exploited only), or "epss:<0-1>" (exploit probability ≥ x). Malicious packages always fail.'
    required: false
    default: 'cve'
runs:
  using: 'node20'
  main: 'dist/index.js'
